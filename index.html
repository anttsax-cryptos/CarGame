<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CarGame — 3D Racing Demo</title>
  <style>
    html,body{height:100%;margin:0}
    #overlay{position:fixed;left:10px;top:10px;color:#fff;font-family:monospace;z-index:10}
    #overlay .line{margin-bottom:6px}
    canvas{display:block;width:100%;height:100%}
    body{background:#111}
  </style>
</head>
<body>
  <div id="overlay">
    <div class="line">Speed: <span id="speed">0</span></div>
    <div class="line">Laps: <span id="laps">0</span></div>
    <div class="line">Controls: WASD / ↑↓←→ to drive, R to reset</div>
  </div>

  <!-- use a stable Three.js from CDN -->
  <script src="https://unpkg.com/three@0.161.0/build/three.min.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
